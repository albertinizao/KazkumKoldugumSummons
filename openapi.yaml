        remaining:
          type: integer
          minimum: 0
          example: 4
          description: Usos diarios restantes. Entero >= 0 y nunca superior a maximum.
      description: Contador de usos diarios. Debe cumplir siempre maximum >= 0 y 0 <= remaining <= maximum.
