      type: string
      description: 'Estado visible/API de una instancia de criatura activa.

        Únicos valores permitidos en el MVP:

        - HEALTHY: currentHitPoints == maxHitPoints.

        - DAMAGED: currentHitPoints > 0 && currentHitPoints < maxHitPoints.

        - DOWN: currentHitPoints <= 0.

        REMOVED no se expone ni se persiste como estado; eliminar una criatura borra la instancia activa.

        ACTIVE no se usa como estado de instancia.

        '
      enum:
      - HEALTHY
      - DAMAGED
      - DOWN
