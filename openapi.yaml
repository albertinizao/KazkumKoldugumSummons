          type: integer
          minimum: 1
          maximum: 9
        dailyUsesMaximum:
          type: integer
          minimum: 0
          description: Nuevo máximo de usos diarios. Entero >= 0. Si reduce el máximo por debajo del remaining actual, se
            ajusta remaining al nuevo máximo.
        dailyUsesRemaining:
          type: integer
          minimum: 0
          description: Nuevo valor de usos restantes. Entero >= 0 y no puede superar el máximo efectivo.
      description: Actualización parcial de configuración. Si se reduce dailyUsesMaximum por debajo del remaining actual,
        la API ajusta remaining = min(remaining, dailyUsesMaximum). Si se envían dailyUsesMaximum y dailyUsesRemaining explícitamente,
        debe cumplirse 0 <= remaining <= maximum.
