        se multiplican y los componentes con multipliesOnCritical=false se conservan una vez sin multiplicarse. total suma
        todos los componentes.
      required:
      - components
      - total
      properties:
        components:
          type: array
          items:
            $ref: '#/components/schemas/DamageComponentRollResult'
        total:
          type: integer
        displayText:
          type: string
          nullable: true
    DamageComponentRollResult:
      type: object
      description: Resultado de un componente de daño. multipliesOnCritical se conserva para que el frontend pueda mostrar
        y depurar por qué un componente se multiplicó o se mantuvo una vez en crítico.
