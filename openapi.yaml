      properties:
        formula:
          type: string
          example: 1d3+4
        roll:
          $ref: '#/components/schemas/DiceRoll'
        damageType:
          $ref: '#/components/schemas/DamageType'
        multipliesOnCritical:
          type: boolean
          description: Si es false, el componente no se multiplica en crítico, pero se incluye una vez si forma parte del
            ataque.
        total:
          type: integer
    GroupSavingThrowsRollResponse:
